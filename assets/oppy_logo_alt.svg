  <text x="390" y="170" fill="url(#title)" font-size="138" font-weight="800" font-family="'Avenir Next', 'Montserrat', 'Segoe UI', sans-serif" letter-spacing="7">OPPY</text>
  <text x="394" y="238" fill="#E5F4FF" font-size="34" font-weight="600" font-family="'Avenir Next', 'Montserrat', 'Segoe UI', sans-serif" letter-spacing="2">MISSION CONTROL FOR PROXY LINKS</text>
